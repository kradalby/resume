name: CI

on:
  push:
  pull_request:
    branches:
      - master

# Gate jobs only call `nix build .#checks.<sys>.<name>`, so no `nix develop`
# default shell is needed. The check logic lives in flake.nix.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main

      - name: build
        run: nix build -L .#checks.x86_64-linux.build

  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main

      - name: formatting
        run: nix build -L .#checks.x86_64-linux.formatting

  # ── Render + deploy lane (not a flake check: the electron PDF render needs a
  #    headless X display, and Pages deploy needs the GITHUB_TOKEN). Kept on the
  #    nix develop shell. ──
  render-deploy:
    runs-on: ubuntu-latest
    needs: [build, formatting]
    # Best-effort: the electron PDF render pulls node-sass (deprecated, fails to
    # build natively on current Node). Tracked separately; don't fail CI on it.
    continue-on-error: true
    permissions:
      # peaceiris/actions-gh-pages pushes to the gh-pages branch.
      contents: write
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main

      - name: Install dependencies
        run: make install

      - name: Run build
        run: make build

      - name: Run render
        run: xvfb-run yarn electron-pdf $GITHUB_WORKSPACE/dist/index.html $GITHUB_WORKSPACE/dist/resume.pdf

      - name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: resume.kradalby.no
