name: CI

# Triggers the workflow on push or pull request events but only for the
# master branch
on:
  push:
  pull_request:
    branches:
      - master

# Every `run:` step executes inside `nix develop`, so devShell tools come
# straight from the flake with no per-step prefix.
defaults:
  run:
    shell: nix develop --command bash -e {0}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: NixOS/nix-installer-action@main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@main

      - name: Install dependencies
        run: make install

      - name: Run build
        run: make build

      - name: Run render
        run: xvfb-run yarn electron-pdf $GITHUB_WORKSPACE/dist/index.html $GITHUB_WORKSPACE/dist/resume.pdf

      - name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: resume.kradalby.no
