# Generated/vendored data that must not be reformatted by the builtin hooks.
exclude: '^(yarn\.lock|elm-srcs\.nix|registry\.dat|flake\.lock|dist/|elm-stuff/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: mixed-line-ending
